name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install FFmpeg & Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Render Video via Remotion CLI
        run: npx remotion render src/index.jsx main out/video.mp4
        env:
          # Forza Remotion a usare il Chromium di sistema appena installato, evitando i blocchi sandbox
          REMOTION_CHROME_FLAGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/video.mp4

name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm i

      - run: npx remotion render src/index.jsx TurniLabVideo out/turnilab-video.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/turnilab-video.mp4

name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    # Utilizza direttamente il flusso di lavoro centralizzato, testato e aggiornato da Remotion
    uses: remotion-dev/template-github-action/.github/workflows/render.yml@main
    with:
      # Inserisci qui l'ID esatto della composizione nel tuo codice (es: "main", "HelloWorld", ecc.)
      composition-id: main
      # Il punto di ingresso del tuo codice Remotion
      entry-point: src/index.jsx
      # Il nome del file video finale che vuoi generare
      output-location: out/video.mp4

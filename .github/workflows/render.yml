name: Render TurniLab Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Create output folder
        run: mkdir -p out

      - name: Render video
        run: npx remotion render src/index.jsx TurniLabVideo out/turnilab-video.mp4 --codec=h264

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/turnilab-video.mp4
          retention-days: 7

      - name: Upload to Google Drive
        if: ${{ secrets.GDRIVE_CREDENTIALS != '' }}
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: out/turnilab-video.mp4
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: true
          mimeType: video/mp4

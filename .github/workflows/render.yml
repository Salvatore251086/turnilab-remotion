name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Chrome Headless Shell dependencies (Remotion official list)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libdbus-1-3 \
            libatk1.0-0 \
            libasound2t64 \
            libxrandr2 \
            libxkbcommon-dev \
            libxfixes3 \
            libxcomposite1 \
            libxdamage1 \
            libgbm-dev \
            libcups2 \
            libcairo2 \
            libpango-1.0-0 \
            libatk-bridge2.0-0

      - run: npm i

      - run: npx remotion render src/index.jsx TurniLabVideo out/turnilab-video.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/turnilab-video.mp4

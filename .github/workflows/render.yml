name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Render Video via Remotion CLI
        run: npx remotion render src/index.jsx main out/video.mp4
        env:
          # Utilizza l'eseguibile pre-installato e funzionante di GitHub
          REMOTION_CHROME_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/video.mp4

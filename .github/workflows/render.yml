name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxext6 libxfixas3 libxrandr2 libgbm1 libasound2 ffmpeg

      - name: Install Dependencies
        run: npm install

      - name: Render Video with Remotion
        run: npm run build
        env:
          REMOTION_CHROME_FLAGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/video.mp4

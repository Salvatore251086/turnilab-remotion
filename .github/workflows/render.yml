name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    container:
      image: remotiondev/remotion:ubuntu
      # Forziamo il container a usare i permessi utente corretti di GitHub Actions
      options: --user root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: npm run build
        env:
          # Forza Chromium a ignorare le restrizioni della sandbox Docker
          REMOTION_CHROME_FLAGS: --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage
          # Evita che il processo vada in crash per mancanza di allocazione di memoria condivisa
          DISABLE_GL_LOOPS: "true"

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/video.mp4

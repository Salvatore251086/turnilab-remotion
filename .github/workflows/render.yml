name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Remotion Render Action (Ufficiale e Testata)
        uses: remotion-dev/template-github-action@v4
        with:
          # Il comando di build definito nel tuo package.json
          entry-point: src/index.jsx
          composition-id: main # Sostituisci con l'ID esatto della tua composizione se diverso
          output-location: out/video.mp4
        env:
          REMOTION_CHROME_FLAGS: --no-sandbox --disable-setuid-sandbox

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnilab-video
          path: out/video.mp4
